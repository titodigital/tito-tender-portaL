name: Daily Cyber Tender Scrape

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper (self-contained)
        shell: python
        run: |
          import requests, json, re, os, time, logging
          from bs4 import BeautifulSoup
          from datetime import datetime, date
          from dataclasses import dataclass, field, asdict
          from typing import List
          import urllib3
          urllib3.disable_warnings()

          logging.basicConfig(level=logging.INFO, format="%(asctime)s %(message)s")
          log = logging.getLogger(__name__)

          KEYWORDS = [
            "cybersecurity","cyber security","information security","network security",
            "SOC","SIEM","intrusion detection","IDS","IPS","firewall",
            "penetration testing","pentest","vulnerability assessment","VAPT",
            "endpoint protection","EDR","XDR","zero trust","IAM",
            "data protection","POPIA","compliance","ISO 27001","NIST",
            "threat intelligence","incident response","cyber forensics",
            "artificial intelligence","machine learning","AI platform","AI solution",
            "deep learning","NLP","data analytics","big data",
            "cloud security","DevSecOps","RPA","robotic process automation",
            "digital transformation","OT security","IoT security",
          ]

          HEADERS = {"User-Agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
          TARGET_YEAR = 2026

          @dataclass
          class Tender:
            id: int = 0
            title: str = ""
            ref: str = ""
            dept: str = ""
            country: str = "South Africa"
            source: str = ""
            url: str = ""
            category: str = "ict"
            value: str = ""
            closing: str = ""
            posted: str = ""
            description: str = ""
            keywords: List[str] = field(default_factory=list)
            score: int = 50
            priority: str = "medium"
            status: str = "Identified"

          def kw_match(t):
            text = f"{t.title} {t.description}".lower()
            hits = [k for k in KEYWORDS if k.lower() in text]
            t.keywords = list(set(hits))
            return len(hits) > 0

          def auto_score(t):
            s = 50
            tx = f"{t.title} {t.description}".lower()
            if "iso 27001" in tx or "isms" in tx: s += 25
            if any(k in tx for k in ["soc","siem","penetration","vapt","incident response"]): s += 20
            if any(k in tx for k in ["artificial intelligence","machine learning"," ai "]): s += 12
            if "popia" in tx or "compliance" in tx: s += 10
            if t.country != "South Africa": s -= 5
            return max(40, min(99, s))

          def is_open_2026(t):
            if not t.closing: return False
            try:
              d = datetime.strptime(t.closing, "%Y-%m-%d").date()
              return d.year == TARGET_YEAR and d >= date.today()
            except: return False

          def fetch(url, params=None):
            try:
              time.sleep(1.5)
              r = requests.get(url, headers=HEADERS, params=params, timeout=20, verify=False)
              r.raise_for_status()
              return BeautifulSoup(r.text, "lxml")
            except Exception as e:
              log.warning(f"Cannot reach {url}: {e}")
              return None

          def normalize_date(raw):
            if not raw: return ""
            for fmt in ["%Y-%m-%d","%d/%m/%Y","%d-%m-%Y","%d %B %Y","%d %b %Y"]:
              try: return datetime.strptime(raw.strip(), fmt).date().isoformat()
              except: pass
            m = re.search(r'(\d{4}-\d{2}-\d{2})', raw)
            return m.group(1) if m else ""

          def scrape_etenders():
            log.info("Scraping eTenders...")
            results, seen = [], set()
            base = "https://www.etenders.gov.za"
            for term in ["cybersecurity","information security","artificial intelligence","network security","ISO 27001","penetration testing"]:
              soup = fetch(f"{base}/home/opportunities", {"keyword": term, "status": "1"})
              if not soup: continue
              for row in soup.select("table.table tbody tr"):
                cols = row.find_all("td")
                if len(cols) < 4: continue
                ref = cols[0].get_text(strip=True)
                if ref in seen: continue
                seen.add(ref)
                ta = cols[1].find("a")
                title = ta.get_text(strip=True) if ta else cols[1].get_text(strip=True)
                href = base + ta["href"] if ta and ta.get("href") else base
                t = Tender(title=title, ref=ref, dept=cols[2].get_text(strip=True),
                           closing=normalize_date(cols[3].get_text(strip=True)),
                           posted=date.today().isoformat(), url=href,
                           source="eTenders Portal", country="South Africa")
                if kw_match(t):
                  t.score = auto_score(t)
                  t.priority = "high" if t.score >= 85 else "medium" if t.score >= 65 else "low"
                  results.append(t)
            log.info(f"eTenders: {len(results)} found")
            return results

          def scrape_gazette():
            log.info("Scraping Government Gazette...")
            results = []
            for url in ["https://www.gpwonline.co.za/Gazettes/Pages/Tender-Bulletin.aspx",
                        "https://www.gov.za/services/government-tenders"]:
              soup = fetch(url)
              if not soup: continue
              for a in soup.find_all("a", href=True):
                text = a.get_text(strip=True)
                if len(text) < 15: continue
                href = a["href"] if a["href"].startswith("http") else "https://www.gpwonline.co.za" + a["href"]
                t = Tender(title=text, url=href, source="SA Government Gazette",
                           country="South Africa", posted=date.today().isoformat())
                if kw_match(t):
                  t.score = auto_score(t)
                  t.priority = "high" if t.score >= 85 else "medium" if t.score >= 65 else "low"
                  results.append(t)
            log.info(f"Gazette: {len(results)} found")
            return results

          SADC = [
            ("Botswana","PPADB Botswana","https://www.ppadb.co.bw/tenders","https://www.ppadb.co.bw/"),
            ("Zambia","ZPPA Zambia","https://www.zppa.org.zm/tenders","https://www.zppa.org.zm/"),
            ("Namibia","CPB Namibia","https://www.cpb.gov.na/tenders","https://www.cpb.gov.na/"),
            ("Tanzania","PPRA Tanzania","https://www.ppra.go.tz/tenders","https://www.ppra.go.tz/"),
            ("Malawi","ODPP Malawi","https://www.odpp.gov.mw/tenders","https://www.odpp.gov.mw/"),
            ("Zimbabwe","Zimbabwe Procurement","https://www.procurement.gov.zw/","https://www.procurement.gov.zw/"),
          ]

          def scrape_sadc():
            log.info("Scraping SADC portals...")
            results = []
            for country, name, url, alt in SADC:
              soup = fetch(url) or fetch(alt)
              if not soup: continue
              seen = set()
              for row in soup.select("table tr,.tender,.bid,.opportunity,article,.listing-item"):
                text = row.get_text(separator=" ", strip=True)
                if len(text) < 20 or text in seen: continue
                seen.add(text)
                a = row.find("a", href=True)
                te = row.find(["h2","h3","h4","strong","a"])
                title = te.get_text(strip=True) if te else text[:150]
                href = (alt.rstrip("/") + a["href"]) if a and a["href"].startswith("/") else (a["href"] if a else alt)
                t = Tender(title=title, description=text[:300], url=href,
                           source=name, country=country, posted=date.today().isoformat())
                if kw_match(t):
                  t.score = auto_score(t)
                  t.priority = "high" if t.score >= 85 else "medium" if t.score >= 65 else "low"
                  results.append(t)
            log.info(f"SADC: {len(results)} found")
            return results

          SEED = [
            dict(title="Provision of Cybersecurity Operations Centre (SOC) Services",ref="DPSA/ICT/2026/CYB-001",dept="Dept of Public Service & Administration",country="South Africa",source="eTenders Portal",url="https://www.etenders.gov.za",category="cybersecurity",value="R 8,500,000",closing="2026-08-15",description="Establishment of a Security Operations Centre including SIEM deployment, 24/7 monitoring, incident response and threat intelligence."),
            dict(title="Supply of AI-Powered Analytics Platform",ref="SITA/AI/2026/047",dept="State Information Technology Agency",country="South Africa",source="eTenders Portal",url="https://www.etenders.gov.za",category="ai",value="R 12,000,000",closing="2026-08-22",description="AI and Machine Learning analytics platform with NLP capabilities for government data processing."),
            dict(title="ISO 27001 ISMS Implementation",ref="NHI/ISMS/2026/003",dept="National Health Insurance Fund",country="South Africa",source="Government Gazette",url="https://www.gpwonline.co.za",category="compliance",value="R 3,200,000",closing="2026-07-28",description="Full ISMS implementation aligned to ISO 27001:2022 including gap analysis, risk assessment and certification audit support."),
            dict(title="Penetration Testing and Vulnerability Assessment",ref="SARB/SEC/2026/011",dept="South African Reserve Bank",country="South Africa",source="eTenders Portal",url="https://www.etenders.gov.za",category="cybersecurity",value="R 1,800,000",closing="2026-08-05",description="Annual penetration testing, VAPT, red team exercises and vulnerability assessment."),
            dict(title="Digital Transformation and Cloud Security Advisory",ref="COGTA/DT/2026/028",dept="Dept of Cooperative Governance",country="South Africa",source="eTenders Portal",url="https://www.etenders.gov.za",category="ict",value="R 5,600,000",closing="2026-09-01",description="Strategic advisory for digital transformation, cloud migration, Zero Trust architecture and Microsoft 365 security."),
            dict(title="POPIA Compliance Framework and Tools",ref="IC/POPIA/2026/002",dept="Information Regulator South Africa",country="South Africa",source="Government Gazette",url="https://www.gpwonline.co.za",category="compliance",value="R 2,400,000",closing="2026-08-12",description="Implementation of POPIA compliance management system, data protection impact assessments and staff awareness training."),
            dict(title="ICT Infrastructure Security Upgrade",ref="NT/ICT/2026/019",dept="National Treasury",country="South Africa",source="eTenders Portal",url="https://www.etenders.gov.za",category="ict",value="R 15,000,000",closing="2026-09-15",description="Next-gen firewalls, EDR deployment, network segmentation and identity management systems."),
            dict(title="Cybersecurity Awareness Training Programme",ref="DSAC/HR/2026/006",dept="Dept of Sport Arts and Culture",country="South Africa",source="Tender Bulletin ZA",url="https://www.tenderbulletin.co.za",category="cybersecurity",value="R 890,000",closing="2026-07-31",description="Cybersecurity awareness training including phishing simulations, e-learning modules and executive workshops."),
            dict(title="National Cyber Incident Response Team",ref="DCDT/CERT/2026/001",dept="Dept of Communications & Digital Technologies",country="South Africa",source="Government Gazette",url="https://www.gpwonline.co.za",category="cybersecurity",value="R 22,000,000",closing="2026-10-01",description="Establish and operate a national CERT/CSIRT capability including threat intelligence sharing and incident coordination."),
            dict(title="AI-Powered SIEM Platform",ref="PRASA/IT/2026/033",dept="Passenger Rail Agency of SA",country="South Africa",source="eTenders Portal",url="https://www.etenders.gov.za",category="ai",value="R 6,700,000",closing="2026-08-28",description="AI-augmented SIEM with automated threat detection, behavioural analytics and OT/IT integration."),
            dict(title="Cybersecurity Consulting — PPADB",ref="PPADB/ICT/2026/014",dept="Public Procurement & Asset Disposal Board",country="Botswana",source="PPADB Botswana",url="https://www.ppadb.co.bw",category="cybersecurity",value="BWP 4,200,000",closing="2026-08-20",description="Information security assessment, policy development and ISO 27001 ISMS implementation."),
            dict(title="ISO 27001 Certification Support — Bank of Namibia",ref="BON/SEC/2026/005",dept="Bank of Namibia",country="Namibia",source="CPB Namibia",url="https://www.cpb.gov.na",category="compliance",value="NAD 3,500,000",closing="2026-08-18",description="ISO 27001:2022 gap analysis, ISMS documentation, controls implementation and pre-certification audit."),
            dict(title="Digital Government AI Platform",ref="TRA/AI/2026/007",dept="Tanzania Revenue Authority",country="Tanzania",source="PPRA Tanzania",url="https://www.ppra.go.tz",category="ai",value="TZS 850,000,000",closing="2026-09-10",description="AI and machine learning platform for tax compliance analytics, risk scoring and fraud detection."),
            dict(title="Network Security Infrastructure — Zambia ICT",ref="ZICTA/NET/2026/022",dept="Zambia ICT Authority",country="Zambia",source="ZPPA Zambia",url="https://www.zppa.org.zm",category="ict",value="ZMW 12,000,000",closing="2026-08-30",description="Firewall infrastructure, IPS/IDS systems and network monitoring across government ministries."),
          ]

          def make_seed():
            out = []
            for r in SEED:
              t = Tender(**{k: r.get(k, "") for k in ["title","ref","dept","country","source","url","category","value","closing","description"]},
                         posted=date.today().isoformat())
              kw_match(t)
              t.score = auto_score(t)
              t.priority = "high" if t.score >= 85 else "medium" if t.score >= 65 else "low"
              out.append(t)
            return out

          # ── Run all scrapers ────────────────────────────────────
          all_t = []
          for fn in [scrape_etenders, scrape_gazette, scrape_sadc]:
            try: all_t.extend(fn())
            except Exception as e: log.error(f"{fn.__name__} crashed: {e}")

          # Deduplicate
          seen, unique = set(), []
          for t in all_t:
            k = re.sub(r'\W+','', t.title.lower())[:60]
            if k and k not in seen:
              seen.add(k); unique.append(t)

          # 2026 open-bid filter
          filtered = [t for t in unique if is_open_2026(t)]

          data_source = "live"
          if not filtered:
            log.warning("No live results — using seed fallback")
            filtered = [t for t in make_seed() if is_open_2026(t)]
            data_source = "fallback_seed"

          for i, t in enumerate(filtered, 1):
            t.id = i

          os.makedirs("data", exist_ok=True)
          output = {
            "generated_at": datetime.now().isoformat(),
            "target_year": TARGET_YEAR,
            "total_open_tenders": len(filtered),
            "data_source": data_source,
            "tenders": [asdict(t) for t in filtered],
          }
          with open("data/tenders.json", "w") as f:
            json.dump(output, f, indent=2)
          log.info(f"✅ Wrote data/tenders.json — {len(filtered)} tenders ({data_source})")

      - name: Commit updated tender data
        run: |
          git config user.name "TITO Tender Bot"
          git config user.email "actions@github.com"
          git add data/tenders.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Daily tender refresh — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
